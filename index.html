<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Цена ошибки</title>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <style>
        body {
            font-family: monospace;
            font-size: 2rem;
            padding: 2rem;
        }
        .spinner {
            display: inline-block;
            width: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
        <p>Веб-манга в процессе... (0/100)</p>
       <span id="spinner" class="spinner">-</span>
    <script>
        const spinnerEl = document.getElementById('spinner');
        const frames = ['-', '\\', '|', '/'];
        let index = 0;

        setInterval(() => {
            index = (index + 1) % frames.length;
            spinnerEl.textContent = frames[index];
        }, 120); // скорость смены символов (120 мс)
    </script>
    <img src="12.png" alt="Заглушка">
</body>
</html>
