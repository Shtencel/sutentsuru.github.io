<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Цена ошибки</title>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <style>
        body {
            font-family: monospace;
            font-size: 2rem;
            padding: 1rem;
             display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh; /* чтобы центрировать по высоте окна */
    margin: 0;
        }
        .spinner {
            display: inline-block;
            white-space: nowrap
            text-align: center;
        }
    </style>
</head>
        <p>Веб-манга в процессе... (0/100)
       <span id="spinner" class="spinner">-</span>
            </p>
    <script>
        const spinnerEl = document.getElementById('spinner');
        const frames = ['О ω О','о ω о', '- ω -','о ω о'];
        let index = 0;

        setInterval(() => {
            index = (index + 1) % frames.length;
            spinnerEl.textContent = frames[index];
        }, 150); // скорость смены символов
    </script>
    <img src="12.png" alt="Заглушка">
</body>
</html>
