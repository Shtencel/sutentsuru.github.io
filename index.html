<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цена ошибки</title>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;  /* центрирует картинку */
}

img {
    display: block;      /* убирает лишние отступы снизу */
    max-width: 100%;
    height: auto;
    margin: 0 auto;      /* центрирует по горизонтали */
}
        body {
            font-family: monospace;
            font-size: 2rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* центрировать по высоте окна */
            margin: 0;
            img {
        border: 4px solid black;
}
        }
        .spinner {
            display: inline-block;
            white-space: nowrap
            text-align: center;
        }
    </style>
</head>
        <p>Веб-манга в процессе... 3%
       <span id="spinner" class="spinner">-</span>
            </p>
    <script>
        const spinnerEl = document.getElementById('spinner');
        const frames = ['О ω О','о ω о', '- ω -','о ω о'];
        let index = 0;

        setInterval(() => {
            index = (index + 1) % frames.length;
            spinnerEl.textContent = frames[index];
        }, 150); // скорость смены символов
    </script>
    <img src="1.png" alt="Заглушка">
    <img src="1.2res.png" alt="Тест1">
</body>
</html>
